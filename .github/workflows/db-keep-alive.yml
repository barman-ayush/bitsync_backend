name: Database Keep-Alive

on:
  schedule:
    # Runs every hour at minute 0 (e.g. 00:00, 01:00, 02:00 UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Enables manual execution from the GitHub Actions tab

jobs:
  ping-db:
    name: Ping Aiven PostgreSQL Database
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Database Ping
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npx ts-node scripts/ping-db.ts
